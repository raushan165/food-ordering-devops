services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  menu-service:
    build: ./menu-service
    container_name: menu-service
    ports:
      - "3001:3001"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"

  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  nginx:
    image: nginx
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-service
      - menu-service
      - order-service